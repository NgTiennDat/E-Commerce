server:
  port: 8060

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: ecommerce-files
  presigned-url-expiry-seconds: 3600
  max-file-size-bytes: 10485760
  allowed-content-types:
    - image/jpeg
    - image/png
    - image/webp
    - image/gif
