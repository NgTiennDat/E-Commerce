server:
  port: 8030

spring:
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  kafka:
    consumer:
      group-id: notification-group

# Tên hiển thị trong email gửi đi
notification:
  mail:
    from: noreply@ecommerce.com
    from-name: E-Commerce Platform
