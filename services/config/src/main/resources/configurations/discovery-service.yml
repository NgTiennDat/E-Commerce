server:
  port: 8761

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka

# Tắt tracing cho discovery service — không cần thiết
management:
  tracing:
    sampling:
      probability: 0.0
