server:
  port: 8060

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/payment?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_ROOT_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  kafka:
    consumer:
      group-id: payment-group

# VNPay config — điền sau khi có tài khoản sandbox
# Đăng ký tại: https://sandbox.vnpayment.vn/devreg/
vnpay:
  tmn-code: ${VNPAY_TMN_CODE:}
  hash-secret: ${VNPAY_HASH_SECRET:}
  url: ${VNPAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
  return-url: ${VNPAY_RETURN_URL:http://localhost:3000/payment/result}
  api-url: https://sandbox.vnpayment.vn/merchant_webapi/api/transaction
