app:
  jwt:
    enabled: true

spring:
  config:
    import: optional:configserver:http://localhost:8888
  application:
    name: auth-service

  swagger:
    enable: true
    title: E-Buy Auth API
    description: API documentation for E-Buy Auth service
    version: 1.0.0

  # Spring Cache dùng Redis làm backend.
  # Redis là distributed cache — đảm bảo tất cả instance thấy cùng 1 cache state.
  cache:
    type: redis
    redis:
      time-to-live: 60000       # TTL 60s — permission stale tối đa 60s sau khi admin thay đổi
      cache-null-values: false  # Không cache false để tránh stale khi admin vừa cấp quyền

  # Kafka producer.
  # bootstrap-servers đọc từ env variable — không hardcode.
  # Production: set KAFKA_BOOTSTRAP_SERVERS=broker1:9092,broker2:9092
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

application:
  security:
    jwt:
      secret-key: YoVBs+fSApwsrc0fZeUG7tFtyRjc4nIixENeTMlkwSXdmnCSS48XPYhUO29JPqeO
      expiration: 900000
      refresh-token:
        expiration: 604800000

redis:
  host: 127.0.0.1
  port: 6379

internal:
  secret: ${INTERNAL_SECRET:dev-internal-secret-change-in-prod}
